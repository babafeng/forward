name: Release Go Binaries

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]  # 目标系统：linux、windows、macOS
        goarch: [amd64, arm64]          # 目标架构：amd64、arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'

      - name: Build and Release
        uses: goreleaser/goreleaser-action@v6  # 最新是 v6.4.0，可直接用 v6
        with:
          distribution: goreleaser  # 默认，可省略
          version: '~> v2'          # 默认，可省略（会用最新 v2.x）
          args: release --clean     # 关键：这里指定 release 命令
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
